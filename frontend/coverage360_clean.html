<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coverage360 - Medical Benefit Drug Coverage Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --slate: #3e5161;
            --sky: #91bfeb;
            --navy: #15173f;
            --white: #ffffff;
            --line: #dee2e6;
            --ink2: #6c757d;
        }

        body {
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            background: #faf8f5;
            overflow: hidden;
        }

        /* Watercolor washes */
        .wc { position: fixed; pointer-events: none; z-index: 0; }
        .wc-1 { top: -80px; left: -60px; width: 600px; height: 600px; border-radius: 60% 40% 55% 45% / 50% 60% 40% 55%; background: radial-gradient(ellipse, rgba(255,160,60,0.38) 0%, rgba(255,120,30,0.18) 50%, transparent 75%); filter: blur(40px); mix-blend-mode: multiply; }
        .wc-2 { top: 10%; right: -80px; width: 550px; height: 650px; border-radius: 45% 55% 40% 60% / 60% 40% 55% 45%; background: radial-gradient(ellipse, rgba(100,180,230,0.35) 0%, rgba(60,140,210,0.18) 50%, transparent 75%); filter: blur(50px); mix-blend-mode: multiply; }
        .wc-3 { bottom: -60px; left: 30%; width: 580px; height: 500px; border-radius: 55% 45% 60% 40% / 45% 55% 40% 60%; background: radial-gradient(ellipse, rgba(220,60,140,0.28) 0%, rgba(200,40,120,0.14) 50%, transparent 75%); filter: blur(45px); mix-blend-mode: multiply; }
        .wc-4 { top: 40%; left: 20%; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(ellipse, rgba(255,200,80,0.2) 0%, transparent 70%); filter: blur(60px); mix-blend-mode: multiply; }
        .wc-5 { bottom: 10%; right: 15%; width: 350px; height: 350px; border-radius: 50%; background: radial-gradient(ellipse, rgba(80,160,220,0.22) 0%, transparent 70%); filter: blur(55px); mix-blend-mode: multiply; }

        /* Top bar */
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 64px;
            padding: 0 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .topbar img { height: 48px; width: auto; }

        .topbar-actions { display: flex; gap: 10px; }

        .btn-ghost {
            font-size: 12px; font-weight: 500; font-family: 'Roboto', sans-serif;
            color: var(--slate); background: rgba(200,205,210,0.45);
            border: 1.5px solid rgba(220,224,228,0.7);
            border-radius: 999px; padding: 7px 16px; cursor: pointer;
            -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
            transition: all 0.2s;
        }
        .btn-ghost:hover { background: rgba(200,205,210,0.7); }

        .btn-solid {
            font-size: 12px; font-weight: 500; font-family: 'Roboto', sans-serif;
            color: var(--navy); background: rgba(200,205,210,0.55);
            border: 1.5px solid rgba(220,224,228,0.7);
            border-radius: 999px; padding: 7px 16px; cursor: pointer;
            -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
            box-shadow: 0 4px 16px rgba(100,120,160,0.1), inset 0 1px 0 rgba(255,255,255,0.6);
            transition: all 0.2s;
        }
        .btn-solid:hover { background: rgba(200,205,210,0.75); }

        /* Center content */
        .center {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding-bottom: 48px;
        }

        .center img.logo { height: 200px; width: auto; }

        /* Search bar */
        .search-wrap {
            width: 100%;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .search-bar {
            width: 100%;
            display: flex;
            align-items: center;
            background: rgba(200,205,210,0.45);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1.5px solid rgba(220,224,228,0.7);
            border-radius: 999px;
            padding: 0 8px 0 20px;
            box-shadow: 0 4px 24px rgba(100,120,160,0.1), inset 0 1px 0 rgba(255,255,255,0.6);
            transition: all 0.2s;
        }
        .search-bar:focus-within {
            background: rgba(200,205,210,0.65);
            box-shadow: 0 6px 28px rgba(100,120,160,0.16), inset 0 1px 0 rgba(255,255,255,0.7);
        }

        .search-bar svg { flex-shrink: 0; color: var(--slate); }

        .search-bar input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 15px;
            font-family: 'Roboto', sans-serif;
            color: var(--navy);
            padding: 14px 12px;
        }
        .search-bar input::placeholder { color: rgba(62,81,97,0.45); }

        .search-bar button {
            flex-shrink: 0;
            background: rgba(255,255,255,0.5);
            border: 1.5px solid rgba(220,224,228,0.7);
            border-radius: 999px;
            padding: 8px 20px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Roboto', sans-serif;
            color: var(--navy);
            cursor: pointer;
            transition: all 0.2s;
        }
        .search-bar button:hover { background: rgba(255,255,255,0.75); }

        /* Quick suggestions */
        .suggestions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .suggestions span { font-size: 11px; color: var(--ink2); }
        .suggestions button {
            font-size: 12px; padding: 4px 12px; border-radius: 999px;
            background: rgba(200,205,210,0.4); border: 1.5px solid rgba(220,224,228,0.6);
            color: var(--slate); cursor: pointer; font-family: 'Roboto', sans-serif;
            -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
            transition: all 0.2s;
        }
        .suggestions button:hover { background: rgba(200,205,210,0.7); }
    </style>
</head>
<body>

    <!-- Watercolor background -->
    <div class="wc wc-1"></div>
    <div class="wc wc-2"></div>
    <div class="wc wc-3"></div>
    <div class="wc wc-4"></div>
    <div class="wc wc-5"></div>

    <!-- Top bar -->
    <div class="topbar">
        <img src="/frontend/public/logo.png" alt="Coverage360" />
        <div class="topbar-actions">
            <button class="btn-ghost">Sign In</button>
            <button class="btn-solid">Get Started</button>
        </div>
    </div>

    <!-- Center content -->
    <div class="center">
        <img class="logo" src="/frontend/public/logo.png" alt="Coverage360" />

        <div class="search-wrap">
            <div class="search-bar">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
                    <circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5l3 3" stroke-linecap="round"/>
                </svg>
                <input type="text" placeholder="Drug name, generic name, or J-code…" />
                <button>Search</button>
            </div>

            <div class="suggestions">
                <span>Try:</span>
                <button>Rituximab</button>
                <button>Adalimumab</button>
                <button>Bevacizumab</button>
            </div>
        </div>
    </div>

</body>
</html>
